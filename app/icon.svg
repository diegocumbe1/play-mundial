<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Boleta de rifa">
  <defs>
    <linearGradient id="oro" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFDD70"/>
      <stop offset="1" stop-color="#E8A81C"/>
    </linearGradient>
    <!-- Muescas arriba y abajo: dan la silueta reconocible de boleta. -->
    <mask id="boleta">
      <rect x="8" y="18" width="48" height="28" rx="7" fill="#fff"/>
      <circle cx="32" cy="18" r="5.5" fill="#000"/>
      <circle cx="32" cy="46" r="5.5" fill="#000"/>
    </mask>
  </defs>

  <rect width="64" height="64" rx="15" fill="#0F1115"/>
  <rect x="8" y="18" width="48" height="28" rx="7" fill="url(#oro)" mask="url(#boleta)"/>

  <!-- Perforación central -->
  <path d="M32 24v3.5M32 30.5v3.5M32 37v3.5" stroke="#0F1115" stroke-width="2.4"
        stroke-linecap="round" opacity="0.85"/>

  <!-- Estrella: el "premio" de la boleta -->
  <path d="M19.5 26.4l1.9 3.9 4.3.6-3.1 3 .7 4.3-3.8-2-3.8 2 .7-4.3-3.1-3 4.3-.6z"
        fill="#0F1115"/>

  <!-- Números insinuados en el talón derecho -->
  <path d="M41 29h8M41 33h8M41 37h5" stroke="#0F1115" stroke-width="2.4"
        stroke-linecap="round" opacity="0.55"/>
</svg>
